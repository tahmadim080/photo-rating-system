<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PixelRate — Admin Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&family=Roboto+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--bg:#2d353b;--surface:#343f44;--border:#4a555b;--card:#3d484d;--accent:#a7c080;--yellow:#dbbc7f;--red:#e67e80;--blue:#7fbbb3;--purple:#d699b6;--orange:#e69875;--text:#d3c6aa;--text2:#e8d5b0;--muted:#859289;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
#adminLogin{display:flex;align-items:center;justify-content:center;min-height:100vh;}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 8px 32px rgba(0,0,0,0.3);}
.login-box h1{font-size:1.5rem;font-weight:700;color:var(--text2);margin-bottom:4px;}
.login-box p{font-family:'Roboto Mono',monospace;font-size:0.7rem;color:var(--muted);margin-bottom:28px;}
.fg{margin-bottom:16px;}
label{display:block;font-family:'Roboto Mono',monospace;font-size:0.68rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:6px;}
input{width:100%;padding:11px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text2);font-family:'Roboto',sans-serif;font-size:0.9rem;outline:none;transition:border-color 0.2s;}
input:focus{border-color:var(--accent);}
.btn{width:100%;padding:12px;background:var(--accent);color:#2d353b;border:none;border-radius:8px;font-family:'Roboto',sans-serif;font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;}
.btn:hover{background:#8faa6a;transform:translateY(-1px);}
.err-msg{margin-top:10px;padding:9px 12px;background:rgba(230,126,128,0.15);border:1px solid rgba(230,126,128,0.4);color:var(--red);border-radius:6px;font-family:'Roboto Mono',monospace;font-size:0.75rem;display:none;}
#adminPanel{display:none;}
nav{position:sticky;top:0;z-index:100;background:rgba(45,53,59,0.97);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);padding:0 24px;height:60px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{font-size:1.2rem;font-weight:700;color:var(--text2);}
.nav-logo span{color:var(--accent);}
.nav-tag{font-family:'Roboto Mono',monospace;font-size:0.65rem;color:var(--accent);background:rgba(167,192,128,0.15);border:1px solid rgba(167,192,128,0.3);padding:3px 10px;border-radius:20px;}
.nav-right{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.nbtn{font-family:'Roboto Mono',monospace;font-size:0.68rem;padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.nbtn:hover{border-color:var(--accent);color:var(--accent);}
.nbtn.danger{border-color:rgba(230,126,128,0.4);color:var(--red);}
.nbtn.danger:hover{background:rgba(230,126,128,0.1);}
.nbtn.primary{background:var(--accent);color:#2d353b;border-color:var(--accent);font-weight:700;}
.nbtn.primary:hover{background:#8faa6a;}
.wrap{max-width:1200px;margin:0 auto;padding:36px 24px 80px;}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:32px;}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;}
.stat .n{font-size:2rem;font-weight:700;font-family:'Roboto Mono',monospace;color:var(--accent);}
.stat .l{font-family:'Roboto Mono',monospace;font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-top:3px;}
.sec{margin-bottom:36px;}
.sec-title{font-family:'Roboto Mono',monospace;font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;}
.sec-title .xbtn{font-size:0.62rem;padding:4px 10px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.sec-title .xbtn:hover{border-color:var(--accent);color:var(--accent);}
.tbl{width:100%;border-collapse:collapse;font-size:0.85rem;}
.tbl th{font-family:'Roboto Mono',monospace;font-size:0.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);}
.tbl td{padding:12px 14px;border-bottom:1px solid rgba(74,85,91,0.4);vertical-align:middle;}
.tbl tr:hover td{background:rgba(167,192,128,0.04);}
.nm{color:var(--text2);font-weight:500;}
.em{font-family:'Roboto Mono',monospace;font-size:0.75rem;color:var(--muted);}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-family:'Roboto Mono',monospace;font-size:0.6rem;font-weight:700;text-transform:uppercase;}
.badge.done{background:rgba(167,192,128,0.15);color:var(--accent);border:1px solid rgba(167,192,128,0.35);}
.badge.part{background:rgba(219,188,127,0.15);color:var(--yellow);border:1px solid rgba(219,188,127,0.35);}
.badge.none{background:rgba(133,146,137,0.15);color:var(--muted);border:1px solid rgba(133,146,137,0.35);}
.mpb{height:4px;background:var(--surface);border-radius:2px;overflow:hidden;width:72px;display:inline-block;vertical-align:middle;margin-right:5px;}
.mpf{height:100%;border-radius:2px;}
.ds-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:12px;}
.ds-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:18px;position:relative;overflow:hidden;}
.ds-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:var(--dsc);}
.ds-title{font-size:1rem;font-weight:700;color:var(--text2);margin-bottom:3px;}
.ds-sub{font-family:'Roboto Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:12px;}
.ds-bar{height:5px;background:var(--surface);border-radius:3px;overflow:hidden;margin-bottom:6px;}
.ds-fill{height:100%;border-radius:3px;transition:width 0.5s;}
.ds-stats{display:flex;justify-content:space-between;font-family:'Roboto Mono',monospace;font-size:0.62rem;color:var(--muted);}
.rf{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:center;}
.rf-lbl{font-family:'Roboto Mono',monospace;font-size:0.65rem;color:var(--muted);}
.rf-btn{font-family:'Roboto Mono',monospace;font-size:0.65rem;padding:5px 11px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--muted);cursor:pointer;transition:all 0.15s;}
.rf-btn.active{border-color:var(--accent);color:var(--accent);background:rgba(167,192,128,0.1);}
.pg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:10px;}
.pc{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.pc img{width:100%;aspect-ratio:4/3;object-fit:cover;display:block;background:var(--surface);}
.pi{padding:8px 10px;}
.ps{color:var(--yellow);font-size:0.78rem;}
.pu{font-family:'Roboto Mono',monospace;font-size:0.58rem;color:var(--muted);margin-top:2px;}
.loading-wrap{text-align:center;padding:80px 20px;color:var(--muted);font-family:'Roboto Mono',monospace;font-size:0.8rem;}
.spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 16px;}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{text-align:center;padding:40px;color:var(--muted);font-family:'Roboto Mono',monospace;font-size:0.78rem;}
.last-sync{font-family:'Roboto Mono',monospace;font-size:0.62rem;color:var(--muted);}
.rank-gold{background:rgba(219,188,127,0.2);color:var(--yellow);border:1px solid rgba(219,188,127,0.5);padding:2px 8px;border-radius:20px;font-family:'Roboto Mono',monospace;font-size:0.6rem;font-weight:700;}
.rank-silver{background:rgba(127,187,179,0.2);color:var(--blue);border:1px solid rgba(127,187,179,0.5);padding:2px 8px;border-radius:20px;font-family:'Roboto Mono',monospace;font-size:0.6rem;font-weight:700;}
.rank-bronze{background:rgba(230,152,117,0.2);color:var(--orange);border:1px solid rgba(230,152,117,0.5);padding:2px 8px;border-radius:20px;font-family:'Roboto Mono',monospace;font-size:0.6rem;font-weight:700;}
/* Modal */
.modal-ov{display:none;position:fixed;inset:0;z-index:500;background:rgba(10,12,14,0.88);backdrop-filter:blur(8px);align-items:center;justify-content:center;padding:20px;}
.modal-ov.show{display:flex;}
.modal-bx{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:32px;width:100%;max-width:760px;max-height:90vh;overflow-y:auto;box-shadow:0 24px 60px rgba(0,0,0,0.5);animation:mfade 0.2s ease;}
@keyframes mfade{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.modal-head{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:20px;}
.modal-head h2{font-size:1.2rem;font-weight:700;color:var(--text2);}
.modal-close{background:none;border:1px solid var(--border);color:var(--muted);padding:4px 10px;border-radius:6px;cursor:pointer;font-family:'Roboto Mono',monospace;font-size:0.7rem;transition:all 0.2s;}
.modal-close:hover{border-color:var(--red);color:var(--red);}
/* Photo manager */
.ds-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px;}
.ds-tab{font-family:'Roboto Mono',monospace;font-size:0.68rem;padding:6px 14px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--muted);cursor:pointer;transition:all 0.2s;}
.ds-tab.active{font-weight:700;}
/* Slot grid */
.slot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;margin-top:8px;}
.slot-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.slot-head{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
.slot-title{font-family:'Roboto Mono',monospace;font-size:0.72rem;color:var(--text2);font-weight:700;}
.slot-count{font-family:'Roboto Mono',monospace;font-size:0.6rem;color:var(--muted);}
.slot-photos{display:grid;grid-template-columns:repeat(5,1fr);gap:3px;padding:6px;}
.slot-photo{position:relative;aspect-ratio:1;border-radius:4px;overflow:hidden;background:var(--border);}
.slot-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.slot-photo .sp-del{position:absolute;inset:0;background:rgba(230,126,128,0.85);display:none;align-items:center;justify-content:center;font-size:0.65rem;color:white;cursor:pointer;font-family:'Roboto Mono',monospace;}
.slot-photo:hover .sp-del{display:flex;}
.slot-empty{aspect-ratio:1;border-radius:4px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:center;font-size:0.6rem;color:var(--muted);font-family:'Roboto Mono',monospace;}
.slot-add{padding:6px 12px 10px;}
.slot-add-btn{width:100%;padding:6px;background:transparent;border:1px dashed var(--border);border-radius:6px;color:var(--muted);font-family:'Roboto Mono',monospace;font-size:0.65rem;cursor:pointer;transition:all 0.2s;text-align:center;}
.slot-add-btn:hover{border-color:var(--accent);color:var(--accent);}
.slot-add-btn.full{border-color:var(--accent);color:var(--accent);cursor:default;background:rgba(167,192,128,0.05);}
.pm-msg{font-family:'Roboto Mono',monospace;font-size:0.72rem;padding:8px 12px;border-radius:6px;margin-bottom:12px;display:none;}
.pm-msg.ok{background:rgba(167,192,128,0.12);border:1px solid rgba(167,192,128,0.35);color:var(--accent);}
.pm-msg.err{background:rgba(230,126,128,0.12);border:1px solid rgba(230,126,128,0.35);color:var(--red);}
.pm-summary{font-family:'Roboto Mono',monospace;font-size:0.65rem;color:var(--muted);margin-bottom:14px;padding:8px 12px;background:var(--surface);border-radius:6px;border:1px solid var(--border);}
.pm-summary span{color:var(--accent);font-weight:700;}
</style>
</head>
<body>

<div id="adminLogin">
  <div class="login-box">
    <h1>PixelRate <span style="color:var(--accent)">Admin</span></h1>
    <p>// Restricted — group members only</p>
    <div class="fg">
      <label>Admin Password</label>
      <input type="password" id="adminPass" placeholder="Enter admin password" onkeydown="if(event.key==='Enter')checkAdmin()"/>
    </div>
    <button class="btn" onclick="checkAdmin()">Enter Admin Panel</button>
    <div class="err-msg" id="adminErr">Incorrect password.</div>
  </div>
</div>

<div id="adminPanel">
  <nav>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="nav-logo">Pixel<span>Rate</span></div>
      <div class="nav-tag">Admin Panel</div>
    </div>
    <div class="nav-right">
      <span class="last-sync" id="lastSync"></span>
      <button class="nbtn" onclick="loadData()">Refresh</button>
      <button class="nbtn primary" onclick="openPhotoMgr()">Manage Photos</button>
      <button class="nbtn" onclick="exportRankedCSV()">Export Ranked CSV</button>
      <button class="nbtn danger" onclick="resetAllData()">Reset All Data</button>
      <button class="nbtn danger" onclick="doLogout()">Logout</button>
    </div>
  </nav>

  <div class="wrap">
    <div id="loadingWrap" class="loading-wrap">
      <div class="spinner"></div>
      Loading from Firebase...
    </div>
    <div id="content" style="display:none">
      <div class="stats-row" id="globalStats"></div>
      <div class="sec">
        <div class="sec-title">Dataset Overview</div>
        <div class="ds-grid" id="dsSummary"></div>
      </div>
      <div class="sec">
        <div class="sec-title">
          <span>All Users</span>
          <button class="xbtn" onclick="exportRankedCSV()">Export Ranked CSV</button>
        </div>
        <div style="overflow-x:auto">
          <table class="tbl">
            <thead><tr>
              <th>Name</th><th>Email</th>
              <th>Tanvir</th><th>Alvi</th><th>Provat</th><th>Mim</th><th>Nadim</th>
              <th>Total</th><th>Status</th>
            </tr></thead>
            <tbody id="usersBody"></tbody>
          </table>
        </div>
      </div>
      <div class="sec">
        <div class="sec-title">
          <span>All Ratings — Ranked Highest to Lowest</span>
          <button class="xbtn" onclick="exportRankedCSV()">Export CSV</button>
        </div>
        <div class="rf" id="rf">
          <span class="rf-lbl">Filter by dataset:</span>
          <button class="rf-btn active" onclick="filterDS('all',this)">All</button>
        </div>
        <div class="pg" id="pg"></div>
      </div>
    </div>
  </div>
</div>

<!-- Photo Manager Modal -->
<div class="modal-ov" id="photoModal">
  <div class="modal-bx">
    <div class="modal-head">
      <h2>📁 Manage Dataset Photos</h2>
      <button class="modal-close" onclick="closePhotoMgr()">✕ Close</button>
    </div>
    <div class="ds-tabs" id="dsTabs"></div>
    <div class="pm-msg" id="pmMsg"></div>
    <div class="pm-summary" id="pmSummary"></div>
    <div class="slot-grid" id="slotGrid"></div>
    <!-- hidden file inputs per slot -->
    <input type="file" id="slotFileInput" multiple accept="image/*" style="display:none"/>
  </div>
</div>

<script>
const ADMIN_PASSWORD = 'pixelrate2024';
const FIREBASE_URL = 'https://pixelrate-cd325-default-rtdb.asia-southeast1.firebasedatabase.app/';

const DS = [
  { id:'tanvir', member:'Tanvir', color:'#a7c080' },
  { id:'alvi',   member:'Alvi',   color:'#7fbbb3' },
  { id:'provat', member:'Provat', color:'#d699b6' },
  { id:'mim',    member:'Mim',    color:'#dbbc7f' },
  { id:'nadim',  member:'Nadim',  color:'#e69875' }
];

const FB = {
  url(p){ return FIREBASE_URL + p + '.json'; },
  lastError:'',
  async get(p){ try{ const r=await fetch(this.url(p)); return await r.json(); }catch(e){ return null; } },
  async set(p,data){
    this.lastError='';
    try{
      const r=await fetch(this.url(p),{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
      if(!r.ok){ const t=await r.text(); this.lastError='HTTP '+r.status+': '+t; return false; }
      return true;
    }catch(e){ this.lastError=e.message; return false; }
  },
  async del(p){
    this.lastError='';
    try{
      const r=await fetch(this.url(p),{method:'DELETE'});
      if(!r.ok){ const t=await r.text(); this.lastError='HTTP '+r.status+': '+t; return false; }
      return true;
    }catch(e){ this.lastError=e.message; return false; }
  }
};

/* ---- Auth ---- */
function checkAdmin(){
  if(document.getElementById('adminPass').value===ADMIN_PASSWORD){
    document.getElementById('adminLogin').style.display='none';
    document.getElementById('adminPanel').style.display='block';
    localStorage.setItem('adminOk','1');
    loadData();
  } else {
    const e=document.getElementById('adminErr');
    e.style.display='block';
    setTimeout(()=>e.style.display='none',3000);
  }
}
function doLogout(){
  localStorage.removeItem('adminOk');
  document.getElementById('adminPanel').style.display='none';
  document.getElementById('adminLogin').style.display='flex';
  document.getElementById('adminPass').value='';
}

/* ---- Reset All User Data ---- */
async function resetAllData(){
  const confirmed = confirm(
    '⚠️ WARNING: This will permanently delete ALL user accounts and ALL ratings from Firebase.\n\n' +
    'Photos will NOT be deleted.\n\n' +
    'Type "RESET" to confirm.'
  );
  if(!confirmed) return;
  const typed = prompt('Type RESET to confirm:');
  if(typed !== 'RESET'){ alert('Cancelled. Nothing was deleted.'); return; }
  showPmMsg('Deleting all user data...','ok');
  await FB.del('/users');
  await FB.del('/ratings');
  alert('✓ All user data has been reset. Photos are still intact.');
  loadData();
}

/* ---- Load Data ---- */
let allUsers={}, allRatings={}, filterDsId='all';

async function loadData(){
  document.getElementById('loadingWrap').style.display='block';
  document.getElementById('content').style.display='none';
  try{
    const rawUsers=await FB.get('/users');
    const rawRatings=await FB.get('/ratings');
    allUsers={};
    if(rawUsers) for(const k in rawUsers){ try{ allUsers[atob(k)]=rawUsers[k]; }catch(e){} }
    allRatings={};
    if(rawRatings) for(const k in rawRatings){ try{ allRatings[atob(k)]=rawRatings[k]; }catch(e){} }
    document.getElementById('lastSync').textContent='Synced '+new Date().toLocaleTimeString();
    renderAll();
    document.getElementById('loadingWrap').style.display='none';
    document.getElementById('content').style.display='block';
  }catch(err){
    document.getElementById('loadingWrap').innerHTML='<div style="color:var(--red);font-family:Roboto Mono,monospace;font-size:0.8rem;max-width:400px;margin:0 auto"><strong>Failed to load.</strong><br><br>Check FIREBASE_URL<br><br><button onclick="loadData()" style="padding:8px 16px;background:var(--accent);color:#2d353b;border:none;border-radius:6px;cursor:pointer;font-weight:700;margin-top:8px">Retry</button></div>';
  }
}

function renderAll(){
  const userList=Object.values(allUsers);
  let totalRatings=0,completedUsers=0;
  const byDs={};
  DS.forEach(ds=>byDs[ds.id]=0);
  for(const email in allRatings){
    let ut=0;
    for(const dsId in allRatings[email]){
      const cnt=Object.keys((allRatings[email][dsId]||{}).ratings||{}).length;
      ut+=cnt; byDs[dsId]=(byDs[dsId]||0)+cnt;
    }
    totalRatings+=ut;
    if(ut>=500) completedUsers++;
  }
  document.getElementById('globalStats').innerHTML=
    s(userList.length,'Total Users')+s(totalRatings,'Total Ratings')+
    s(completedUsers,'Fully Done')+s(userList.length?(totalRatings/userList.length).toFixed(0):0,'Avg / User')+
    s(userList.length?(totalRatings/(userList.length*500)*100).toFixed(1)+'%':'0%','Overall');

  const dg=document.getElementById('dsSummary'); dg.innerHTML='';
  DS.forEach(ds=>{
    const tot=byDs[ds.id]||0, max=userList.length*100;
    const pct=max?Math.round(tot/max*100):0;
    const d=document.createElement('div'); d.className='ds-card';
    d.style.setProperty('--dsc',ds.color);
    d.innerHTML='<div class="ds-title">'+ds.member+"'s Dataset"+'</div>'+
      '<div class="ds-sub">'+tot+' ratings · '+userList.length+' users</div>'+
      '<div class="ds-bar"><div class="ds-fill" style="width:'+pct+'%;background:'+ds.color+'"></div></div>'+
      '<div class="ds-stats"><span>'+pct+'% complete</span><span>'+(userList.length?(tot/userList.length).toFixed(1):0)+' avg</span></div>';
    dg.appendChild(d);
  });

  const tbody=document.getElementById('usersBody'); tbody.innerHTML='';
  if(!userList.length){
    tbody.innerHTML='<tr><td colspan="9" class="empty">No users yet.</td></tr>';
  } else {
    userList.forEach(u=>{
      const r=allRatings[u.email]||{}; let ut=0;
      const cells=DS.map(ds=>{
        const cnt=Object.keys((r[ds.id]||{}).ratings||{}).length; ut+=cnt;
        const pct=Math.round(cnt/100*100);
        return '<td><div class="mpb"><div class="mpf" style="width:'+pct+'%;background:'+ds.color+'"></div></div>'+
          '<span style="font-family:Roboto Mono,monospace;font-size:0.72rem;color:var(--muted)">'+cnt+'</span></td>';
      }).join('');
      const badge=ut>=500?'<span class="badge done">Complete</span>':ut>0?'<span class="badge part">In Progress</span>':'<span class="badge none">Not Started</span>';
      const tr=document.createElement('tr');
      tr.innerHTML='<td><span class="nm">'+u.name+'</span></td><td><span class="em">'+u.email+'</span></td>'+cells+
        '<td style="font-family:Roboto Mono,monospace;font-size:0.8rem;color:var(--accent);font-weight:600">'+ut+'</td><td>'+badge+'</td>';
      tbody.appendChild(tr);
    });
  }

  const rf=document.getElementById('rf');
  rf.innerHTML='<span class="rf-lbl">Filter by dataset:</span><button class="rf-btn active" onclick="filterDS(\'all\',this)">All</button>';
  DS.forEach(ds=>{
    const b=document.createElement('button'); b.className='rf-btn';
    b.textContent=ds.member; b.onclick=()=>filterDS(ds.id,b); rf.appendChild(b);
  });
  renderRankedPhotos();
}

/* ---- Ranked photo grid ---- */
function filterDS(dsId,el){
  filterDsId=dsId;
  document.querySelectorAll('.rf-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  renderRankedPhotos();
}

function buildPhotoScores(){
  const scores={};
  for(const email in allRatings){
    DS.forEach(ds=>{
      const dr=((allRatings[email]||{})[ds.id]||{}).ratings||{};
      for(let ci=0;ci<20;ci++){
        for(let pi=0;pi<5;pi++){
          const idx=ci*5+pi;
          const r=dr[idx];
          if(!r) continue;
          const key=ds.id+'_'+idx;
          if(!scores[key]) scores[key]={ds,idx,ci,pi:pi+1,total:0,count:0};
          scores[key].total+=r.stars;
          scores[key].count++;
        }
      }
    });
  }
  return Object.values(scores).map(x=>({...x,avg:x.total/x.count})).sort((a,b)=>b.avg-a.avg||b.count-a.count);
}

function getPhotoSrc(ds,ci,pi){
  const slotKey='slot_'+(ci+1);
  const slot=(_dsPhotos[ds.id]||{})[slotKey]||{};
  const keys=Object.keys(slot).sort();
  if(keys[pi-1]) return slot[keys[pi-1]];
  return 'https://picsum.photos/seed/'+ds.id+'_slot'+(ci+1)+'_'+pi+'/400/300';
}

function getPhotoFilename(ds,ci,pi){
  const slotKey='slot_'+(ci+1);
  const slot=(_dsPhotos[ds.id]||{})[slotKey]||{};
  const keys=Object.keys(slot).sort();
  return keys[pi-1] ? keys[pi-1] : 'slot'+(ci+1)+'_photo'+pi;
}

function renderRankedPhotos(){
  const g=document.getElementById('pg'); g.innerHTML='';
  let items=buildPhotoScores();
  if(filterDsId!=='all') items=items.filter(x=>x.ds.id===filterDsId);
  if(!items.length){ g.innerHTML='<div class="empty" style="grid-column:1/-1">No ratings yet.</div>'; return; }
  items.slice(0,120).forEach((item,rank)=>{
    const src=getPhotoSrc(item.ds,item.ci,item.pi);
    const stars=Math.round(item.avg);
    let rankBadge='';
    if(rank===0) rankBadge='<span class="rank-gold">🥇 #1</span>';
    else if(rank===1) rankBadge='<span class="rank-silver">🥈 #2</span>';
    else if(rank===2) rankBadge='<span class="rank-bronze">🥉 #3</span>';
    else rankBadge='<span style="font-family:Roboto Mono,monospace;font-size:0.6rem;color:var(--muted)">#'+(rank+1)+'</span>';
    const c=document.createElement('div'); c.className='pc';
    c.innerHTML='<img src="'+src+'" loading="lazy"/>'+
      '<div class="pi">'+
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px">'+rankBadge+
        '<span style="color:var(--yellow);font-size:0.78rem">'+'★'.repeat(stars)+'</span></div>'+
        '<div class="pu">Avg: <strong style="color:var(--accent)">'+item.avg.toFixed(2)+'</strong> / 5</div>'+
        '<div class="pu">'+item.count+' rating'+(item.count!==1?'s':'')+' · Slot '+(item.ci+1)+' · '+item.ds.member+'</div>'+
      '</div>';
    g.appendChild(c);
  });
}

function s(val,label){ return '<div class="stat"><div class="n">'+val+'</div><div class="l">'+label+'</div></div>'; }

/* ══════════════════════════════════════
   CSV — clean format with real filenames
══════════════════════════════════════ */
function exportRankedCSV(){
  let csv='SECTION 1: ALL INDIVIDUAL RATINGS\n';
  csv+='User Name,User Email,Dataset,Slot,Photo Filename,Stars Given\n';
  for(const email in allRatings){
    const name=(allUsers[email]||{}).name||email;
    DS.forEach(ds=>{
      const dr=((allRatings[email]||{})[ds.id]||{}).ratings||{};
      for(let ci=0;ci<20;ci++){
        for(let pi=0;pi<5;pi++){
          const idx=ci*5+pi;
          const r=dr[idx];
          if(!r) continue;
          const fname=getPhotoFilename(ds,ci,pi+1);
          csv+='"'+name+'","'+email+'","'+ds.member+'","Slot '+(ci+1)+'","'+fname+'",'+r.stars+'\n';
        }
      }
    });
  }
  csv+='\n\nSECTION 2: PHOTO RANKINGS — HIGHEST TO LOWEST AVERAGE\n';
  csv+='Rank,Dataset,Slot,Photo Filename,Average Rating,Total Ratings\n';
  buildPhotoScores().forEach((item,i)=>{
    const fname=getPhotoFilename(item.ds,item.ci,item.pi);
    csv+=(i+1)+',"'+item.ds.member+'","Slot '+(item.ci+1)+'","'+fname+'",'+item.avg.toFixed(2)+','+item.count+'\n';
  });
  dl(csv,'pixelrate_ranked_ratings.csv');
}

function dl(csv,name){
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'}));
  a.download=name; a.click();
}

/* ══════════════════════════════════════
   PHOTO MANAGER — slot based
══════════════════════════════════════ */
let activeDsId='tanvir';
let _dsPhotos={}; // cache: dsId -> { slot_1: { filename: base64 }, ... }
let _activeSlot=null;

async function openPhotoMgr(){
  const tabs=document.getElementById('dsTabs');
  tabs.innerHTML=DS.map(ds=>
    '<button class="ds-tab'+(ds.id===activeDsId?' active':'')+'" '+
    'style="'+(ds.id===activeDsId?'border-color:'+ds.color+';color:'+ds.color+';background:rgba(0,0,0,0.1)':'')+'" '+
    'onclick="switchDsTab(\''+ds.id+'\',this,\''+ds.color+'\')">'+ds.member+'</button>'
  ).join('');
  document.getElementById('photoModal').classList.add('show');
  // Test Firebase write access
  const testOk=await FB.set('/photos/_test','ok');
  if(testOk){
    await FB.del('/photos/_test');
  } else {
    showPmMsg('⚠ Firebase write access denied: '+FB.lastError+'. Go to Firebase Console → Realtime Database → Rules → set read/write to true.','err');
  }
  await loadDsPhotos(activeDsId);
}

function closePhotoMgr(){
  document.getElementById('photoModal').classList.remove('show');
}
document.getElementById('photoModal').addEventListener('click',function(e){ if(e.target===this) closePhotoMgr(); });

async function switchDsTab(dsId,el,color){
  activeDsId=dsId;
  document.querySelectorAll('.ds-tab').forEach(t=>{ t.classList.remove('active'); t.style.borderColor=''; t.style.color=''; t.style.background=''; });
  el.classList.add('active'); el.style.borderColor=color; el.style.color=color; el.style.background='rgba(0,0,0,0.1)';
  await loadDsPhotos(dsId);
}

async function loadDsPhotos(dsId){
  document.getElementById('pmMsg').style.display='none';
  document.getElementById('slotGrid').innerHTML='<div style="color:var(--muted);font-family:Roboto Mono,monospace;font-size:0.75rem;padding:16px;grid-column:1/-1">Loading slots...</div>';
  const data=await FB.get('/photos/'+dsId);
  _dsPhotos[dsId]=(data&&typeof data==='object')?data:{};
  renderSlotGrid(dsId);
}

function renderSlotGrid(dsId){
  const ds=DS.find(d=>d.id===dsId);
  const dsData=_dsPhotos[dsId]||{};
  let totalPhotos=0;
  for(let i=1;i<=20;i++){
    const slot=dsData['slot_'+i]||{};
    totalPhotos+=Object.keys(slot).length;
  }
  document.getElementById('pmSummary').innerHTML=
    ds.member+"'s dataset: <span>"+totalPhotos+' / 100<\/span> photos uploaded across 20 slots';

  const grid=document.getElementById('slotGrid'); grid.innerHTML='';
  for(let si=1;si<=20;si++){
    const slotKey='slot_'+si;
    const slot=dsData[slotKey]||{};
    const photoKeys=Object.keys(slot).sort();
    const count=photoKeys.length;

    const card=document.createElement('div'); card.className='slot-card';
    // Head
    let head=document.createElement('div'); head.className='slot-head';
    head.innerHTML='<span class="slot-title">Slot '+si+'</span><span class="slot-count">'+count+'/5</span>';
    card.appendChild(head);

    // Photos row (5 spots)
    const photosDiv=document.createElement('div'); photosDiv.className='slot-photos';
    for(let pi=0;pi<5;pi++){
      const div=document.createElement('div');
      if(photoKeys[pi]){
        div.className='slot-photo';
        div.innerHTML='<img src="'+slot[photoKeys[pi]]+'" loading="lazy" title="'+photoKeys[pi]+'"/>'+
          '<div class="sp-del" onclick="deleteSlotPhoto(\''+dsId+'\',\''+slotKey+'\',\''+photoKeys[pi]+'\')">✕</div>';
      } else {
        div.className='slot-empty'; div.textContent=(pi+1);
      }
      photosDiv.appendChild(div);
    }
    card.appendChild(photosDiv);

    // Add button
    const addDiv=document.createElement('div'); addDiv.className='slot-add';
    const addBtn=document.createElement('button');
    if(count>=5){
      addBtn.className='slot-add-btn full'; addBtn.textContent='✓ Slot Full';
      addBtn.disabled=true;
    } else {
      addBtn.className='slot-add-btn';
      addBtn.textContent='+ Add Photos ('+(5-count)+' remaining)';
      addBtn.onclick=()=>triggerSlotUpload(dsId,slotKey,5-count);
    }
    addDiv.appendChild(addBtn); card.appendChild(addDiv);
    grid.appendChild(card);
  }
}

function triggerSlotUpload(dsId,slotKey,remaining){
  _activeSlot={dsId,slotKey,remaining};
  const inp=document.getElementById('slotFileInput');
  inp.value='';
  inp.onchange=()=>handleSlotFiles(inp.files);
  inp.click();
}

async function handleSlotFiles(files){
  if(!files||!files.length) return;
  const {dsId,slotKey,remaining}=_activeSlot;
  const toUpload=Array.from(files).slice(0,remaining);
  showPmMsg('Compressing & uploading '+toUpload.length+' photo'+(toUpload.length>1?'s':'')+'...','ok');
  let uploaded=0;
  for(const file of toUpload){
    const b64=await toBase64(file);
    const fname=file.name.replace(/[^a-zA-Z0-9_-]/g,'_').substring(0,60);
    const ok=await FB.set('/photos/'+dsId+'/'+slotKey+'/'+fname, b64);
    if(ok){
      if(!_dsPhotos[dsId]) _dsPhotos[dsId]={};
      if(!_dsPhotos[dsId][slotKey]) _dsPhotos[dsId][slotKey]={};
      _dsPhotos[dsId][slotKey][fname]=b64;
      uploaded++;
    } else {
      showPmMsg('✕ Upload failed: '+FB.lastError,'err');
    }
  }
  renderSlotGrid(dsId);
  if(uploaded===toUpload.length){
    showPmMsg('✓ Uploaded '+uploaded+' photo'+(uploaded>1?'s':'')+'! Slot now has '+Object.keys((_dsPhotos[dsId][slotKey]||{})).length+'/5 photos.','ok');
  }
}

async function deleteSlotPhoto(dsId,slotKey,fname){
  if(!confirm('Delete "'+fname+'"?')) return;
  await FB.del('/photos/'+dsId+'/'+slotKey+'/'+fname);
  delete _dsPhotos[dsId][slotKey][fname];
  renderSlotGrid(dsId);
  showPmMsg('Photo deleted.','ok');
}

function showPmMsg(msg,type){
  const el=document.getElementById('pmMsg');
  el.textContent=msg; el.className='pm-msg '+(type||'ok'); el.style.display='block';
  setTimeout(()=>el.style.display='none',4000);
}

function toBase64(file){
  return new Promise((res,rej)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        const canvas=document.createElement('canvas');
        const MAX=400;
        let w=img.width, h=img.height;
        if(w>MAX||h>MAX){
          if(w>h){ h=Math.round(h*MAX/w); w=MAX; }
          else{ w=Math.round(w*MAX/h); h=MAX; }
        }
        canvas.width=w; canvas.height=h;
        canvas.getContext('2d').drawImage(img,0,0,w,h);
        res(canvas.toDataURL('image/jpeg',0.5));
      };
      img.onerror=()=>rej(new Error('Failed to load image'));
      img.src=reader.result;
    };
    reader.onerror=()=>rej(new Error('Failed to read file'));
    reader.readAsDataURL(file);
  });
}

  document.getElementById('adminLogin').style.display='none';
  document.getElementById('adminPanel').style.display='block';
  loadData();
